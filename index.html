<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>GEGP Brasil | 🤠👍🏻Index</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reset básico para garantir que nada saia do lugar */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        /* Bloqueio de rolagem quando o modal está aberto */
        body.modal-open {
            overflow: hidden;
        }

        .container {
            max-width: 900px;
            text-align: center;
            width: 100%;
            /* Esconde o conteúdo principal se os termos não forem aceitos */
            display: none; 
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .menu-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #fff;
            padding: 20px;
            font-size: 16px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .menu-btn:hover {
            background: #3b82f6;
            transform: translateY(-3px) scale(1.03);
            border-color: #60a5fa;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .desc {
            font-size: 13px;
            opacity: 0.75;
            margin-top: 8px;
            line-height: 1.2;
        }

        /* ------------------------------------- */
        /* ESTILOS DO MODAL DE TERMOS DE USO     */
        /* ------------------------------------- */
        #termsModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-content img {
            width: 110px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 10px; /* Caso a logo seja quadrada */
        }

        .modal-content h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #f8fafc;
        }

        .modal-content p {
            font-size: 15px;
            color: #94a3b8;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .pdf-link {
            display: inline-block;
            background: #334155;
            color: #60a5fa;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 30px;
            transition: 0.2s;
            border: 1px solid #475569;
        }

        .pdf-link:hover {
            background: #475569;
            color: #93c5fd;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-action {
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
        }

        .btn-agree {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }

        .btn-agree:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-disagree {
            background: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .btn-disagree:hover {
            background: #ef4444;
            color: white;
        }

        /* Ajustes para Celular */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .menu-btn { padding: 16px; font-size: 14px; }
            .desc { font-size: 12px; }
            .modal-buttons { flex-direction: column; }
            .btn-action { width: 100%; }
        }
    </style>
</head>
<body class="modal-open">

    <!-- OVERLAY DE TERMOS DE USO DA GTCE -->
    <div id="termsModal">
        <div class="modal-content">
            <!-- LOGO DO GEGP -->
            <img src="gegp.png" alt="Logo GEGP" onerror="this.src='https://via.placeholder.com/110x110/334155/ffffff?text=GEGP'">
            
            <h2>Aviso da GTCE</h2>
            <p>Bem-vindo ao GEGP Brasil. Antes de acessar nossos sistemas e jogos, é obrigatório ler e concordar com os nossos Termos de Uso oficiais fornecidos pela GTCE Holding.</p>
            
            <!-- Link para o PDF no MediaFire -->
            <a href="https://www.mediafire.com/file/iv0bz9dq8ohq2wu/14_3_26_Termos+de+uso_GTCE.PDF/file" target="_blank" class="pdf-link">
                📄 Ler Termos de Uso (PDF)
            </a>

            <div class="modal-buttons">
                <button class="btn-action btn-disagree" onclick="declineTerms()">Não Concordar</button>
                <button class="btn-action btn-agree" onclick="acceptTerms()">Concordar e Entrar</button>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL DO HUB (Inicia Oculto) -->
    <div class="container" id="mainContent">
        <h1>🌌 GEGP BRASIL</h1>
        <div class="grid">
            <!-- Botão 1 -->
            <button class="menu-btn" onclick="go('HTML/Hub.html')">
                Hub Universo
                <div class="desc">Save unificado, banco, passe</div>
            </button>

            <!-- Botão 2 -->
            <button class="menu-btn" onclick="go('HTML/idle.html')">
                Ovelha Idle
                <div class="desc">Idle Game</div>
            </button>

            <!-- Botão 3 -->
            <button class="menu-btn" onclick="go('HTML/Ovelhacard.html')">
                Ovelha Card
                <div class="desc">Cartas e pontuação</div>
            </button>

            <!-- Botão 4 -->
            <button class="menu-btn" onclick="go('HTML/LDS2.HTML')">
                Laboratório Suzana 2
                <div class="desc">Lab / Experimentos</div>
              
              <!-- Botão 5 -->
            <button class="menu-btn" onclick="go('HTML/CA.HTML')">
               Cidade Ananás 
              <div class="desc"Mini games</div>
            </button>
        </div>
    </div>

    <script>
        // Lógica de verificação do aceite de termos ao carregar a página
        document.addEventListener("DOMContentLoaded", () => {
            const termsAccepted = localStorage.getItem("gtce_terms_accepted");
            const modal = document.getElementById("termsModal");
            const content = document.getElementById("mainContent");

            if (termsAccepted === "true") {
                // Se já aceitou antes, remove o modal e mostra o conteúdo
                modal.style.display = "none";
                content.style.display = "block";
                document.body.classList.remove("modal-open");
            } else {
                // Se não aceitou, o modal continua visível e a página fica travada
                modal.style.display = "flex";
            }
        });

        // Função de concordar
        function acceptTerms() {
            localStorage.setItem("gtce_terms_accepted", "true");
            document.getElementById("termsModal").style.display = "none";
            document.getElementById("mainContent").style.display = "block";
            document.body.classList.remove("modal-open");
        }

        // Função de não concordar
        function declineTerms() {
            alert("Você optou por não concordar. O acesso ao GEGP Brasil requer a aceitação dos Termos da GTCE.");
            // Tenta voltar para a página anterior
            if(window.history.length > 1) {
                window.history.back();
            } else {
                // Se não houver histórico, redireciona para uma página em branco ou página externa
                window.location.href = "about:blank"; 
            }
        }

        // Função de navegação dos botões
        function go(page) {
            window.location.href = page;
        }
    </script>
</body>
</html>
